<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Records — All Students</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <span class="logo">&#127891; Student Records</span>
    <nav>
      <a href="index.html"    class="nav-link">Add Student</a>
      <a href="students.html" class="nav-link active">View All</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="card">
    <div class="card-header-row">
      <h2 class="card-title">All Students</h2>
      <a href="index.html" class="btn btn-primary btn-sm">&#43; Add New</a>
    </div>

    <div id="alert" class="alert" style="display:none"></div>

    <div class="search-bar">
      <input type="text" id="searchInput"
             placeholder="&#128269; Search by name, roll no., class or city..."
             oninput="filterTable(this.value)"/>
    </div>

    <div id="loading" class="empty-state"><p>Loading students...</p></div>
    <div id="tableWrapper" class="table-wrapper" style="display:none">
      <table class="data-table" id="studentTable">
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Roll No.</th><th>Class</th><th>City</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <p class="record-count">Total: <strong id="totalCount">0</strong> students</p>
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <p>&#128194; No student records found.</p>
      <a href="index.html" class="btn btn-primary">Add First Student</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>Student Records &mdash; ASP.NET Core API &bull; Azure Static Web App &bull; Azure SQL</p>
</footer>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
  async function loadStudents() {
    try {
      const res      = await fetch(`${API_BASE}/api/students`);
      const students = await res.json();
      renderTable(students);
    } catch {
      showAlert('Cannot reach the server. Check your API URL.', 'error');
      document.getElementById('loading').style.display = 'none';
    }
  }

  function renderTable(students) {
    document.getElementById('loading').style.display = 'none';
    if (!students.length) {
      document.getElementById('emptyState').style.display = 'block'; return;
    }
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = students.map((s, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${escape(s.name)}</strong></td>
        <td><span class="badge">${escape(s.rollNo)}</span></td>
        <td>${escape(s.class)}</td>
        <td>&#128205; ${escape(s.city)}</td>
        <td>
          <button class="btn btn-danger btn-sm"
                  onclick="deleteStudent(${s.id}, '${escape(s.name)}')">
            &#128465; Delete
          </button>
        </td>
      </tr>`).join('');
    document.getElementById('totalCount').textContent = students.length;
    document.getElementById('tableWrapper').style.display = 'block';
  }

  async function deleteStudent(id, name) {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      const res = await fetch(`${API_BASE}/api/students/${id}`, { method: 'DELETE' });
      if (res.ok) { showAlert(`"${name}" deleted.`, 'success'); loadStudents(); }
      else        { showAlert('Failed to delete.', 'error'); }
    } catch {
      showAlert('Cannot reach the server.', 'error');
    }
  }

  function filterTable(q) {
    document.querySelectorAll('#studentTable tbody tr').forEach(row => {
      row.style.display = row.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
    });
  }

  function escape(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadStudents();
</script>
</body>
</html>
