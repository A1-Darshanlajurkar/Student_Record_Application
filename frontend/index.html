<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Records — Add Student</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <span class="logo">&#127891; Student Records</span>
    <nav>
      <a href="index.html"    class="nav-link active">Add Student</a>
      <a href="students.html" class="nav-link">View All</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="card">
    <h2 class="card-title">Add New Student</h2>

    <div id="alert" class="alert" style="display:none"></div>

    <form id="studentForm" class="student-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="name">Student Name <span class="required">*</span></label>
          <input type="text" id="name" placeholder="e.g. Alice Johnson" maxlength="100" required/>
        </div>
        <div class="form-group">
          <label for="rollNo">Roll No. <span class="required">*</span></label>
          <input type="text" id="rollNo" placeholder="e.g. R2024001" maxlength="20" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="className">Class <span class="required">*</span></label>
          <input type="text" id="className" placeholder="e.g. 10th Grade" maxlength="50" required/>
        </div>
        <div class="form-group">
          <label for="city">City <span class="required">*</span></label>
          <input type="text" id="city" placeholder="e.g. New York" maxlength="100" required/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">&#43; Add Student</button>
        <button type="reset"  class="btn btn-secondary">&#8635; Reset</button>
      </div>
    </form>
  </div>
</main>

<footer class="site-footer">
  <p>Student Records &mdash; ASP.NET Core API &bull; Azure Static Web App &bull; Azure SQL</p>
</footer>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById('studentForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn   = document.getElementById('submitBtn');
    const name      = document.getElementById('name').value.trim();
    const rollNo    = document.getElementById('rollNo').value.trim();
    const className = document.getElementById('className').value.trim();
    const city      = document.getElementById('city').value.trim();

    if (!name || !rollNo || !className || !city) {
      showAlert('All fields are required.', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await fetch(`${API_BASE}/api/students`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, rollNo, class: className, city })
      });
      const data = await res.json();
      if (res.ok) {
        showAlert(`Student "${name}" added successfully!`, 'success');
        document.getElementById('studentForm').reset();
      } else {
        showAlert(data.message || 'Failed to add student.', 'error');
      }
    } catch {
      showAlert('Cannot reach the server. Check your API URL.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '+ Add Student';
    }
  });
</script>
</body>
</html>
